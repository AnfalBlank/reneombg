# Nginx Configuration for ERP MBG
# Place this in /etc/nginx/sites-available/reneo.manggalautama.web.id
# Then symbolink to sites-enabled and restart nginx

server {
    listen 80;
    server_name reneo.manggalautama.web.id;

    # Redirect HTTP to HTTPS (optional, but recommended if SSL is set up)
    # return 301 https://$host$request_uri;

    # Frontend Static Files
    location / {
        root /home/indotech/SystemSaas/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API Reverse Proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3000; # Points to the backend port
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
